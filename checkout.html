<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Checkout | Iyarkai Vazhalai</title><link rel="stylesheet" href="styles.css"></head><body><div id="app"></div><script src="app.js"></script><script>
const total=getCart().reduce((a,b)=>a+b.price*b.qty,0);
document.getElementById('app').innerHTML=`${header()}<section class="section container grid grid-2"><form class="card"><h2>Checkout</h2><input class="input" placeholder="Full Name"><p></p><input class="input" placeholder="Phone Number"><p></p><textarea class="input" rows="4" placeholder="Delivery Address"></textarea><p></p><label><input type="radio" name="pay" checked> Cash on Delivery</label><br><label><input type="radio" name="pay"> Razorpay (integration ready)</label><p></p><button type="button" class="btn btn-primary" onclick="alert('Order placed successfully')">Place Order</button></form><div class="card"><h3>Order Summary</h3><div>${getCart().map(i=>`<p>${i.name} x ${i.qty} - ₹${i.price*i.qty}</p>`).join('')}</div><h3>Total: ₹${total}</h3><p class="small">Razorpay key and backend endpoint can be connected next.</p></div></section>${footer()}`;updateCartBadge();
</script></body></html>
